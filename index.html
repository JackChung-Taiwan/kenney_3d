<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Kenney 3D 跑酷遊戲｜HUD 說明面板修正版</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #8ed7ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      touch-action: none;
    }
    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #titleHud,
    #statsHud,
    #helpPanel {
      position: fixed;
      z-index: 10;
      color: #16324f;
      pointer-events: none;
      user-select: none;
    }
    #titleHud {
      top: 14px;
      left: 14px;
    }
    #statsHud {
      top: 14px;
      right: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      font-size: 14px;
      font-weight: 900;
    }
    .panel {
      background: rgba(255,255,255,0.78);
      border: 2px solid rgba(255,255,255,0.82);
      border-radius: 18px;
      padding: 10px 14px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      backdrop-filter: blur(8px);
    }
    #gameTitle {
      font-weight: 1000;
      font-size: 18px;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .statPill {
      min-width: 86px;
      text-align: center;
      white-space: nowrap;
    }
    #helpPanel {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(520px, calc(100vw - 32px));
      display: none;
      z-index: 25;
      line-height: 1.65;
      font-size: 15px;
      pointer-events: none;
    }
    #helpPanel.show { display: block; }
    #helpPanel h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }
    #helpPanel p { margin: 6px 0; }
    #helpPanel kbd {
      display: inline-block;
      min-width: 26px;
      padding: 1px 7px;
      border-radius: 7px;
      background: rgba(20, 50, 82, 0.11);
      font-weight: 900;
      text-align: center;
    }
    #centerMessage {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      min-width: min(460px, 86vw);
      padding: 22px 24px;
      border-radius: 24px;
      background: rgba(255,255,255,0.9);
      color: #143252;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.24);
      border: 2px solid rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      user-select: none;
    }
    #centerMessage h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    #centerMessage p {
      margin: 6px 0;
      line-height: 1.55;
      font-size: 15px;
    }
    #centerMessage button {
      margin-top: 14px;
      padding: 12px 20px;
      border: 0;
      border-radius: 999px;
      background: #ffb33b;
      color: #402600;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(214, 125, 0, 0.25);
    }
    #centerMessage button:active { transform: translateY(1px); }
    #loader {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 11;
      color: #143252;
      background: rgba(255,255,255,0.82);
      border-radius: 999px;
      padding: 9px 13px;
      font-size: 13px;
      font-weight: 800;
      border: 2px solid rgba(255,255,255,0.9);
      pointer-events: none;
      user-select: none;
    }
    #mobileControls {
      position: fixed;
      inset: auto 0 0 0;
      z-index: 12;
      display: none;
      pointer-events: none;
      padding: 18px;
      justify-content: space-between;
      align-items: end;
    }
    .stick, .actions {
      display: grid;
      gap: 10px;
      pointer-events: auto;
    }
    .stick {
      grid-template-columns: repeat(3, 58px);
      grid-template-rows: repeat(3, 58px);
    }
    .actions {
      grid-template-columns: 76px 76px;
      grid-auto-rows: 58px;
    }
    .mBtn {
      border: 0;
      border-radius: 18px;
      background: rgba(255,255,255,0.78);
      color: #143252;
      font-size: 20px;
      font-weight: 1000;
      box-shadow: 0 8px 22px rgba(0,0,0,0.18);
      border: 2px solid rgba(255,255,255,0.88);
      user-select: none;
      touch-action: none;
    }
    .mBtn:active, .mBtn.active {
      background: #ffcf6d;
      transform: translateY(1px);
    }
    .blank { opacity: 0; pointer-events: none; }
    @media (hover: none), (pointer: coarse) {
      #mobileControls { display: flex; }
      #titleHud { top: 10px; left: 10px; }
      #statsHud { top: 10px; right: 10px; font-size: 13px; }
      .panel { padding: 8px 11px; border-radius: 15px; }
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="titleHud" class="panel">
    <div id="gameTitle">3D 跑酷任務</div>
  </div>

  <div id="statsHud">
    <div class="panel statPill">金幣 <b id="coinText">0</b>/<b id="coinTotalText">0</b></div>
    <div class="panel statPill">時間 <b id="timeText">0.0</b>s</div>
    <span style="display:none">狀態：<b id="stateText">準備</b></span>
  </div>

  <div id="helpPanel" class="panel" aria-hidden="true">
    <h2>遊戲說明</h2>
    <p><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / 方向鍵：移動角色</p>
    <p><kbd>Space</kbd>：跳躍 / 二段跳　<kbd>Shift</kbd>：衝刺　<kbd>R</kbd>：重新開始</p>
    <p><kbd>滑鼠拖曳</kbd>：旋轉視角　<kbd>Q</kbd>：左轉視角　<kbd>E</kbd>：顯示 / 隱藏說明</p>
    <p>任務：收集金幣，跳過空隙，抵達終點旗子。</p>
  </div>

  <div id="loader">載入 Kenney 素材中...</div>

  <div id="centerMessage">
    <h1>Kenney 3D 跑酷遊戲</h1>
    <p>收集金幣，跳過空隙，抵達終點旗子。</p>
    <p><b>按 E</b> 可顯示 / 隱藏遊戲說明。</p>
    <button id="startButton">開始遊戲</button>
  </div>

  <div id="mobileControls">
    <div class="stick">
      <button class="mBtn blank"></button>
      <button class="mBtn" data-key="KeyW">▲</button>
      <button class="mBtn blank"></button>
      <button class="mBtn" data-key="KeyA">◀</button>
      <button class="mBtn" data-key="KeyS">▼</button>
      <button class="mBtn" data-key="KeyD">▶</button>
      <button class="mBtn" data-key="KeyQ">↶</button>
      <button class="mBtn" data-key="ShiftLeft">衝</button>
      <button class="mBtn" data-help="true">說明</button>
    </div>
    <div class="actions">
      <button class="mBtn" data-key="Space">跳</button>
      <button class="mBtn" data-key="KeyR">重來</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const canvas = document.getElementById('game');
    const coinText = document.getElementById('coinText');
    const coinTotalText = document.getElementById('coinTotalText');
    const timeText = document.getElementById('timeText');
    const stateText = document.getElementById('stateText');
    const loaderText = document.getElementById('loader');
    const centerMessage = document.getElementById('centerMessage');
    const startButton = document.getElementById('startButton');
    const helpPanel = document.getElementById('helpPanel');

    const ASSET_BASE = 'https://cdn.jsdelivr.net/gh/KenneyNL/Starter-Kit-3D-Platformer@main/';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x8ed7ff);
    scene.fog = new THREE.Fog(0x8ed7ff, 36, 170);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const hemi = new THREE.HemisphereLight(0xffffff, 0x4e8ac4, 1.5);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 2.2);
    sun.position.set(-18, 28, 14);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -80;
    sun.shadow.camera.right = 80;
    sun.shadow.camera.top = 80;
    sun.shadow.camera.bottom = -80;
    scene.add(sun);

    const gltfLoader = new GLTFLoader();

    const mats = {
      grass: new THREE.MeshStandardMaterial({ color: 0x64bd4b, roughness: 0.75 }),
      side: new THREE.MeshStandardMaterial({ color: 0x8a6a43, roughness: 0.9 }),
      stone: new THREE.MeshStandardMaterial({ color: 0x9aa3aa, roughness: 0.75 }),
      orange: new THREE.MeshStandardMaterial({ color: 0xffa72b, roughness: 0.65 }),
      red: new THREE.MeshStandardMaterial({ color: 0xf05a47, roughness: 0.6 }),
      blue: new THREE.MeshStandardMaterial({ color: 0x60c7ff, roughness: 0.45, metalness: 0.05 }),
      yellow: new THREE.MeshStandardMaterial({ color: 0xffd34e, roughness: 0.5, metalness: 0.15 }),
      dark: new THREE.MeshStandardMaterial({ color: 0x26455f, roughness: 0.8 }),
      white: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.6 }),
      black: new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7 })
    };

    const assets = {
      character: null,
      coin: null,
      flag: null,
      cloud: null,
      platform: null
    };

    function loadGLB(path) {
      return new Promise((resolve, reject) => {
        gltfLoader.load(
          ASSET_BASE + path,
          gltf => resolve(gltf.scene),
          undefined,
          error => reject(error)
        );
      });
    }

    async function loadFirst(paths) {
      for (const path of paths) {
        try {
          const model = await loadGLB(path);
          return model;
        } catch (error) {
          console.warn('素材載入失敗，改試下一個：', path);
        }
      }
      return null;
    }

    function normalizeModel(object, targetHeight = 1.6) {
      const box1 = new THREE.Box3().setFromObject(object);
      const size1 = box1.getSize(new THREE.Vector3());
      if (size1.y > 0) {
        object.scale.multiplyScalar(targetHeight / size1.y);
      }
      object.updateMatrixWorld(true);
      const box2 = new THREE.Box3().setFromObject(object);
      const center = box2.getCenter(new THREE.Vector3());
      object.position.sub(center);
      object.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      return object;
    }

    function cloneModel(object) {
      const cloned = object.clone(true);
      cloned.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      return cloned;
    }

    function createFallbackCharacter() {
      // 這個備用角色的「臉」明確朝向本地 -Z。
      // updatePlayerFacing() 使用 lookAt()，會讓本地 -Z 指向移動方向。
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CapsuleGeometry(0.34, 0.72, 6, 12),
        new THREE.MeshStandardMaterial({ color: 0xffb347, roughness: 0.7 })
      );
      body.position.y = 0;
      body.castShadow = true;
      group.add(body);

      const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.68, 0.5, 0.58),
        new THREE.MeshStandardMaterial({ color: 0xffd2a6, roughness: 0.8 })
      );
      head.position.y = 0.68;
      head.castShadow = true;
      group.add(head);

      const eyeGeo = new THREE.BoxGeometry(0.09, 0.09, 0.035);
      const eyeL = new THREE.Mesh(eyeGeo, mats.black);
      const eyeR = new THREE.Mesh(eyeGeo, mats.black);
      eyeL.position.set(-0.17, 0.74, -0.31);
      eyeR.position.set(0.17, 0.74, -0.31);
      group.add(eyeL, eyeR);

      const nose = new THREE.Mesh(
        new THREE.ConeGeometry(0.08, 0.22, 12),
        new THREE.MeshStandardMaterial({ color: 0xffc180, roughness: 0.75 })
      );
      nose.rotation.x = -Math.PI / 2;
      nose.position.set(0, 0.62, -0.41);
      group.add(nose);

      const footGeo = new THREE.BoxGeometry(0.24, 0.16, 0.42);
      const footL = new THREE.Mesh(footGeo, mats.dark);
      const footR = new THREE.Mesh(footGeo, mats.dark);
      footL.position.set(-0.18, -0.78, -0.03);
      footR.position.set(0.18, -0.78, -0.03);
      footL.castShadow = footR.castShadow = true;
      group.add(footL, footR);

      return group;
    }

    function createFallbackCoin() {
      const group = new THREE.Group();
      const coin = new THREE.Mesh(
        new THREE.CylinderGeometry(0.32, 0.32, 0.11, 32),
        mats.yellow
      );
      coin.rotation.x = Math.PI / 2;
      coin.castShadow = true;
      group.add(coin);
      return group;
    }

    function createFallbackFlag() {
      const group = new THREE.Group();
      const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 2.4, 12), mats.white);
      pole.position.y = 1.1;
      pole.castShadow = true;
      const flag = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.55, 0.05), mats.red);
      flag.position.set(0.45, 1.85, 0);
      flag.castShadow = true;
      group.add(pole, flag);
      return group;
    }

    function createFallbackCloud() {
      const group = new THREE.Group();
      const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
      const parts = [
        [-0.6, 0, 0, 0.65],
        [0, 0.12, 0, 0.86],
        [0.7, 0, 0, 0.58],
        [0.25, -0.12, 0.1, 0.52]
      ];
      for (const [x,y,z,s] of parts) {
        const m = new THREE.Mesh(new THREE.SphereGeometry(s, 16, 10), cloudMat);
        m.position.set(x,y,z);
        group.add(m);
      }
      return group;
    }

    async function loadAssets() {
      const tasks = [
        loadFirst(['models/character.glb']).then(m => assets.character = m),
        loadFirst(['models/coin.glb']).then(m => assets.coin = m),
        loadFirst(['models/flag.glb']).then(m => assets.flag = m),
        loadFirst(['models/cloud.glb']).then(m => assets.cloud = m),
        loadFirst(['models/platform.glb', 'models/platform-large.glb', 'models/platform-small.glb']).then(m => assets.platform = m)
      ];
      await Promise.allSettled(tasks);
      if (assets.character) normalizeModel(assets.character, 1.65);
      if (assets.coin) normalizeModel(assets.coin, 0.75);
      if (assets.flag) normalizeModel(assets.flag, 2.3);
      if (assets.cloud) normalizeModel(assets.cloud, 1.3);
      if (assets.platform) normalizeModel(assets.platform, 1.0);
      loaderText.textContent = '素材載入完成';
      setTimeout(() => loaderText.style.display = 'none', 900);
    }

    const platforms = [];
    const coins = [];
    const obstacles = [];
    const fallingPlatforms = [];
    let finishFlag = null;

    function addShadowBox(x, y, z, w, h, d, material) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      return mesh;
    }

    function createPlatform(x, y, z, w, d, type = 'normal') {
      const thickness = 0.48;
      const material = type === 'falling' ? mats.orange : type === 'ice' ? mats.blue : mats.grass;
      const mesh = addShadowBox(x, y, z, w, thickness, d, material);
      const side = addShadowBox(x, y - 0.34, z, w * 0.96, 0.25, d * 0.96, mats.side);

      const platform = {
        x, y, z, w, h: thickness, d,
        top: y + thickness / 2,
        type,
        mesh,
        side,
        touched: false,
        fallTimer: 0,
        disabled: false
      };
      platforms.push(platform);
      if (type === 'falling') fallingPlatforms.push(platform);
      return platform;
    }

    function createCoin(x, y, z) {
      const model = assets.coin ? cloneModel(assets.coin) : createFallbackCoin();
      model.position.set(x, y, z);
      model.userData.baseY = y;
      model.userData.collected = false;
      scene.add(model);
      coins.push(model);
      coinTotalText.textContent = coins.length;
      return model;
    }

    function createObstacle(x, y, z, w, h, d) {
      const mesh = addShadowBox(x, y, z, w, h, d, mats.red);
      obstacles.push({ x, y, z, w, h, d, mesh });
      return mesh;
    }

    function createCloud(x, y, z, s = 1) {
      const model = assets.cloud ? cloneModel(assets.cloud) : createFallbackCloud();
      model.position.set(x, y, z);
      model.scale.multiplyScalar(s);
      scene.add(model);
      return model;
    }

    function createWorld() {
      platforms.length = 0;
      coins.length = 0;
      obstacles.length = 0;
      fallingPlatforms.length = 0;

      createPlatform(0, 0, 0, 8, 8);
      createPlatform(0, 0, -10, 6, 5);
      createPlatform(3.8, 1.1, -18, 5, 4, 'ice');
      createPlatform(-2.8, 2.1, -26, 5, 4);
      createPlatform(0, 2.8, -35, 4.5, 4, 'falling');
      createPlatform(4.2, 3.2, -44, 5, 4);
      createPlatform(0.8, 4.2, -54, 4, 4, 'falling');
      createPlatform(-4.2, 4.9, -64, 5, 4);
      createPlatform(-1.2, 5.5, -74, 4.5, 4, 'ice');
      createPlatform(3.5, 6.2, -84, 5, 4);
      createPlatform(0, 6.8, -96, 8, 8);

      createObstacle(0, 0.65, -10, 1.1, 0.9, 1.1);
      createObstacle(-4.2, 5.55, -64, 1.1, 0.9, 1.1);
      createObstacle(1.8, 7.45, -96, 1.0, 0.9, 1.0);

      const coinPositions = [
        [0, 1.1, -5], [1.6, 1.1, -10], [3.8, 2.2, -18], [-2.8, 3.2, -26],
        [0, 3.9, -35], [4.2, 4.3, -44], [0.8, 5.3, -54], [-4.2, 6.0, -64],
        [-1.2, 6.6, -74], [3.5, 7.3, -84], [0, 7.9, -96]
      ];
      for (const p of coinPositions) createCoin(...p);

      finishFlag = assets.flag ? cloneModel(assets.flag) : createFallbackFlag();
      finishFlag.position.set(0, 8.25, -99);
      scene.add(finishFlag);

      createCloud(-11, 10, -18, 1.7);
      createCloud(9, 13, -42, 1.4);
      createCloud(-12, 15, -70, 1.8);
      createCloud(10, 12, -92, 1.5);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(360, 360),
        new THREE.MeshStandardMaterial({ color: 0x74c56a, roughness: 0.9 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -12;
      ground.receiveShadow = true;
      scene.add(ground);
    }

    const player = {
      group: new THREE.Group(),
      pos: new THREE.Vector3(0, 1.05, 1.2),
      vel: new THREE.Vector3(0, 0, 0),
      height: 1.65,
      radius: 0.38,
      grounded: false,
      canDoubleJump: false,
      visual: null
    };

    const facingDummy = new THREE.Object3D();

    function createPlayer() {
      player.group.clear();

      const visual = assets.character ? cloneModel(assets.character) : createFallbackCharacter();
      player.visual = visual;
      player.group.add(visual);

      // 初始角色臉朝跑道前方，也就是世界 -Z。
      // 因為 character / fallback 都以本地 -Z 當作臉的方向，所以 rotation.y = 0 就是面朝 -Z。
      player.group.rotation.set(0, 0, 0);
      player.group.position.copy(player.pos);
      scene.add(player.group);
    }

    const keys = new Set();
    const justPressed = new Set();
    let started = false;
    let completed = false;
    let startTime = 0;
    let elapsed = 0;
    let collected = 0;
    let cameraYaw = 0;
    let cameraPitch = -0.25;
    let pointerDown = false;
    let lastPointerX = 0;
    let lastPointerY = 0;

    function keyName(code) {
      if (code === 'ArrowUp') return 'KeyW';
      if (code === 'ArrowDown') return 'KeyS';
      if (code === 'ArrowLeft') return 'KeyA';
      if (code === 'ArrowRight') return 'KeyD';
      return code;
    }

    function toggleHelpPanel() {
      const isOpen = helpPanel.classList.toggle('show');
      helpPanel.setAttribute('aria-hidden', isOpen ? 'false' : 'true');
    }

    window.addEventListener('keydown', e => {
      const k = keyName(e.code);

      // E 只負責顯示 / 隱藏遊戲說明，不再拿來旋轉視角，避免操作衝突。
      if (k === 'KeyE') {
        if (!e.repeat) toggleHelpPanel();
        e.preventDefault();
        return;
      }

      if (!keys.has(k)) justPressed.add(k);
      keys.add(k);
      if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
    }, { passive: false });

    window.addEventListener('keyup', e => {
      keys.delete(keyName(e.code));
    });

    document.querySelectorAll('.mBtn[data-key]').forEach(btn => {
      const k = btn.dataset.key;
      const down = e => {
        e.preventDefault();
        if (!keys.has(k)) justPressed.add(k);
        keys.add(k);
        btn.classList.add('active');
      };
      const up = e => {
        e.preventDefault();
        keys.delete(k);
        btn.classList.remove('active');
      };
      btn.addEventListener('pointerdown', down);
      btn.addEventListener('pointerup', up);
      btn.addEventListener('pointercancel', up);
      btn.addEventListener('pointerleave', up);
    });

    document.querySelectorAll('.mBtn[data-help]').forEach(btn => {
      btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        toggleHelpPanel();
      });
    });

    canvas.addEventListener('pointerdown', e => {
      pointerDown = true;
      lastPointerX = e.clientX;
      lastPointerY = e.clientY;
    });
    window.addEventListener('pointerup', () => pointerDown = false);
    window.addEventListener('pointermove', e => {
      if (!pointerDown) return;
      const dx = e.clientX - lastPointerX;
      const dy = e.clientY - lastPointerY;
      lastPointerX = e.clientX;
      lastPointerY = e.clientY;
      cameraYaw -= dx * 0.006;
      cameraPitch = THREE.MathUtils.clamp(cameraPitch - dy * 0.003, -0.75, 0.25);
    });

    startButton.addEventListener('click', () => {
      centerMessage.style.display = 'none';
      startGame();
    });

    function startGame() {
      started = true;
      completed = false;
      startTime = performance.now();
      elapsed = 0;
      collected = 0;
      coinText.textContent = collected;
      stateText.textContent = '跑酷中';
      helpPanel.classList.remove('show');
      helpPanel.setAttribute('aria-hidden', 'true');
      resetPlayer();
      for (const coin of coins) {
        coin.visible = true;
        coin.userData.collected = false;
      }
      for (const p of fallingPlatforms) {
        p.touched = false;
        p.fallTimer = 0;
        p.disabled = false;
        p.mesh.visible = true;
        p.side.visible = true;
        p.mesh.position.y = p.y;
        p.side.position.y = p.y - 0.34;
      }
    }

    function resetPlayer() {
      player.pos.set(0, 1.3, 1.2);
      player.vel.set(0, 0, 0);
      player.grounded = false;
      player.canDoubleJump = true;
      player.group.position.copy(player.pos);
      player.group.rotation.set(0, 0, 0);
      cameraYaw = 0;
      cameraPitch = -0.25;
    }

    function showMessage(title, text, buttonText = '重新開始') {
      centerMessage.querySelector('h1').textContent = title;
      const ps = centerMessage.querySelectorAll('p');
      ps[0].innerHTML = text;
      ps[1].innerHTML = '按下按鈕重新挑戰。';
      startButton.textContent = buttonText;
      centerMessage.style.display = 'block';
    }

    function inputVector() {
      const x = (keys.has('KeyD') ? 1 : 0) - (keys.has('KeyA') ? 1 : 0);
      const y = (keys.has('KeyW') ? 1 : 0) - (keys.has('KeyS') ? 1 : 0);
      const v = new THREE.Vector2(x, y);
      if (v.lengthSq() > 1) v.normalize();
      return v;
    }

    function getCameraRelativeMove(input) {
      const forward = new THREE.Vector3(Math.sin(cameraYaw), 0, -Math.cos(cameraYaw));
      const right = new THREE.Vector3(Math.cos(cameraYaw), 0, Math.sin(cameraYaw));
      const move = new THREE.Vector3();
      move.addScaledVector(forward, input.y);
      move.addScaledVector(right, input.x);
      if (move.lengthSq() > 0.0001) move.normalize();
      return move;
    }

    function updatePlayerFacing(moveDir, dt) {
      if (moveDir.lengthSq() < 0.0001) return;

      // 重要修正：
      // Three.js 的 Object3D.lookAt() 會讓物件的「本地 -Z 軸」朝向目標。
      // Kenney/Godot 角色與本檔備用角色皆以本地 -Z 當作臉的方向。
      // 因此玩家按前進時，moveDir 指向哪裡，臉就會朝哪裡。
      facingDummy.position.copy(player.group.position);
      facingDummy.lookAt(
        player.group.position.x + moveDir.x,
        player.group.position.y,
        player.group.position.z + moveDir.z
      );

      const turnSpeed = Math.min(1, dt * 14);
      player.group.quaternion.slerp(facingDummy.quaternion, turnSpeed);
    }

    function checkPlatformLanding(prevFootY, nextFootY) {
      let best = null;
      for (const p of platforms) {
        if (p.disabled) continue;
        const insideX = player.pos.x > p.x - p.w / 2 - player.radius && player.pos.x < p.x + p.w / 2 + player.radius;
        const insideZ = player.pos.z > p.z - p.d / 2 - player.radius && player.pos.z < p.z + p.d / 2 + player.radius;
        const crossing = prevFootY >= p.top && nextFootY <= p.top;
        if (insideX && insideZ && crossing) {
          if (!best || p.top > best.top) best = p;
        }
      }
      return best;
    }

    function hitObstacle() {
      for (const o of obstacles) {
        const dx = Math.abs(player.pos.x - o.x);
        const dy = Math.abs(player.pos.y - o.y);
        const dz = Math.abs(player.pos.z - o.z);
        if (dx < o.w / 2 + player.radius && dy < o.h / 2 + player.height / 2 && dz < o.d / 2 + player.radius) {
          return true;
        }
      }
      return false;
    }

    function updateCoins(t) {
      for (const coin of coins) {
        if (coin.userData.collected) continue;
        coin.rotation.y += 0.045;
        coin.position.y = coin.userData.baseY + Math.sin(t * 0.004 + coin.position.z) * 0.12;
        if (coin.position.distanceTo(player.pos) < 1.1) {
          coin.userData.collected = true;
          coin.visible = false;
          collected++;
          coinText.textContent = collected;
        }
      }
    }

    function updateFallingPlatforms(dt) {
      for (const p of fallingPlatforms) {
        if (!p.touched || p.disabled) continue;
        p.fallTimer += dt;
        if (p.fallTimer > 0.45) {
          const drop = (p.fallTimer - 0.45) * 7;
          p.mesh.position.y = p.y - drop;
          p.side.position.y = p.y - 0.34 - drop;
        }
        if (p.fallTimer > 1.45) {
          p.disabled = true;
          p.mesh.visible = false;
          p.side.visible = false;
        }
      }
    }

    function updateCamera(dt) {
      if (keys.has('KeyQ')) cameraYaw += dt * 2.1;

      const distance = 9;
      const height = 4.5;
      const back = new THREE.Vector3(-Math.sin(cameraYaw), 0, Math.cos(cameraYaw));
      const desired = player.pos.clone()
        .addScaledVector(back, distance)
        .add(new THREE.Vector3(0, height + Math.sin(cameraPitch) * 4, 0));

      camera.position.lerp(desired, 1 - Math.pow(0.001, dt));
      const target = player.pos.clone().add(new THREE.Vector3(0, 0.9, 0));
      camera.lookAt(target);
    }

    function completeGame() {
      completed = true;
      started = false;
      stateText.textContent = '完成';
      showMessage('任務完成！', `你收集了 <b>${collected}</b> / <b>${coins.length}</b> 枚金幣，時間 <b>${elapsed.toFixed(1)}</b> 秒。`, '再玩一次');
    }

    function update(dt, now) {
      if (!started || completed) {
        updateCamera(dt);
        return;
      }

      elapsed = (performance.now() - startTime) / 1000;
      timeText.textContent = elapsed.toFixed(1);

      if (justPressed.has('KeyR')) {
        startGame();
        justPressed.clear();
        return;
      }

      const input = inputVector();
      const moveDir = getCameraRelativeMove(input);
      const speed = keys.has('ShiftLeft') ? 8.3 : 6.0;

      player.vel.x = moveDir.x * speed;
      player.vel.z = moveDir.z * speed;

      if (justPressed.has('Space')) {
        if (player.grounded) {
          player.vel.y = 8.7;
          player.grounded = false;
          player.canDoubleJump = true;
        } else if (player.canDoubleJump) {
          player.vel.y = 7.2;
          player.canDoubleJump = false;
        }
      }

      updatePlayerFacing(moveDir, dt);

      const prevFootY = player.pos.y - player.height / 2;
      player.vel.y -= 22 * dt;
      player.vel.y = Math.max(player.vel.y, -28);

      player.pos.x += player.vel.x * dt;
      player.pos.z += player.vel.z * dt;
      player.pos.y += player.vel.y * dt;

      const nextFootY = player.pos.y - player.height / 2;
      player.grounded = false;

      if (player.vel.y <= 0) {
        const landed = checkPlatformLanding(prevFootY, nextFootY);
        if (landed) {
          player.pos.y = landed.top + player.height / 2;
          player.vel.y = 0;
          player.grounded = true;
          player.canDoubleJump = true;
          if (landed.type === 'falling') landed.touched = true;
        }
      }

      if (hitObstacle()) {
        stateText.textContent = '碰到障礙';
        resetPlayer();
      }

      if (player.pos.y < -18) {
        stateText.textContent = '掉落，重來';
        resetPlayer();
      }

      player.group.position.copy(player.pos);

      updateCoins(now);
      updateFallingPlatforms(dt);
      updateCamera(dt);

      if (finishFlag && player.pos.distanceTo(finishFlag.position) < 2.2) {
        completeGame();
      }

      justPressed.clear();
    }

    let last = performance.now();
    function animate(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt, now);
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    async function main() {
      try {
        await loadAssets();
      } catch (error) {
        console.warn('素材未完整載入，將使用內建備用模型。', error);
        loaderText.textContent = '部分素材載入失敗，已使用備用模型';
        setTimeout(() => loaderText.style.display = 'none', 1800);
      }
      createWorld();
      createPlayer();
      updateCamera(1 / 60);
      requestAnimationFrame(animate);
    }

    main();
  </script>
</body>
</html>
